spring:
  application:
    name: flowable-app

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowable}
    username: ${DB_USER:flowable}
    password: ${DB_PASSWORD:flowable}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false

flowable:
  database-schema-update: true
  async-executor-activate: true
  history-level: audit

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    org.flowable: INFO
    com.halversondm: DEBUG
